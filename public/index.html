<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Para — three-body JS ecosystem</title>
    <meta
      name="description"
      content="Para is a JavaScript ecosystem in three pieces: Lib (cross-runtime npm packages), Lang (.pts syntax sugar), and Runtime (ParaBun, a Bun fork). Pick whichever you need; they don't depend on each other."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700;9..144,400..700,30..50&family=JetBrains+Mono:wght@400;500;600&family=Spectral:ital,wght@0,300;0,400;0,500;0,600;1,400;1,500&display=swap"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="umbrella">
    <!-- Three-body system: one nebula per product, one star per nebula.
         The stars sit at Lagrange-triangle positions (120° apart) and
         rotate together around a shared barycenter. The nebulae expand
         from behind their card on hover via transform-origin pinned to
         the card's screen center (computed at hover time). -->
    <svg
      class="nebula nebula-lib"
      viewBox="0 0 100 100"
      preserveAspectRatio="none"
      width="100%"
      height="100%"
      aria-hidden="true"
    >
      <defs>
        <filter id="lib-wispy" x="-20%" y="-20%" width="140%" height="140%">
          <feTurbulence type="fractalNoise" baseFrequency="0.07" numOctaves="2" seed="3" result="noise" />
          <feDisplacementMap in="SourceGraphic" in2="noise" scale="14" xChannelSelector="R" yChannelSelector="G" />
        </filter>
        <radialGradient id="lib-blob" cx="50%" cy="50%">
          <stop offset="0%" stop-color="rgb(190, 215, 255)" stop-opacity="0.5" />
          <stop offset="38%" stop-color="rgb(109, 180, 255)" stop-opacity="0.26" />
          <stop offset="100%" stop-color="rgb(109, 180, 255)" stop-opacity="0" />
        </radialGradient>
      </defs>
      <g filter="url(#lib-wispy)" fill="url(#lib-blob)">
        <ellipse cx="30" cy="50" rx="55" ry="42" />
        <ellipse cx="10" cy="15" rx="32" ry="24" />
        <ellipse cx="80" cy="20" rx="34" ry="22" />
        <ellipse cx="15" cy="85" rx="32" ry="22" />
        <ellipse cx="85" cy="80" rx="34" ry="24" />
        <ellipse cx="95" cy="50" rx="28" ry="34" />
        <ellipse cx="55" cy="35" rx="22" ry="16" />
      </g>
    </svg>

    <svg
      class="nebula nebula-lang"
      viewBox="0 0 100 100"
      preserveAspectRatio="none"
      width="100%"
      height="100%"
      aria-hidden="true"
    >
      <defs>
        <filter id="lang-wispy" x="-20%" y="-20%" width="140%" height="140%">
          <feTurbulence type="fractalNoise" baseFrequency="0.07" numOctaves="2" seed="7" result="noise" />
          <feDisplacementMap in="SourceGraphic" in2="noise" scale="14" xChannelSelector="R" yChannelSelector="G" />
        </filter>
        <radialGradient id="lang-blob" cx="50%" cy="50%">
          <stop offset="0%" stop-color="rgb(255, 234, 160)" stop-opacity="0.5" />
          <stop offset="38%" stop-color="rgb(255, 213, 74)" stop-opacity="0.24" />
          <stop offset="100%" stop-color="rgb(255, 213, 74)" stop-opacity="0" />
        </radialGradient>
      </defs>
      <g filter="url(#lang-wispy)" fill="url(#lang-blob)">
        <ellipse cx="50" cy="40" rx="50" ry="38" />
        <ellipse cx="20" cy="20" rx="30" ry="22" />
        <ellipse cx="80" cy="20" rx="32" ry="22" />
        <ellipse cx="50" cy="80" rx="38" ry="26" />
        <ellipse cx="15" cy="60" rx="26" ry="20" />
        <ellipse cx="85" cy="60" rx="28" ry="20" />
      </g>
    </svg>

    <svg
      class="nebula nebula-runtime"
      viewBox="0 0 100 100"
      preserveAspectRatio="none"
      width="100%"
      height="100%"
      aria-hidden="true"
    >
      <defs>
        <filter id="runtime-wispy" x="-20%" y="-20%" width="140%" height="140%">
          <feTurbulence type="fractalNoise" baseFrequency="0.07" numOctaves="2" seed="11" result="noise" />
          <feDisplacementMap in="SourceGraphic" in2="noise" scale="14" xChannelSelector="R" yChannelSelector="G" />
        </filter>
        <radialGradient id="runtime-blob" cx="50%" cy="50%">
          <stop offset="0%" stop-color="rgb(255, 170, 150)" stop-opacity="0.46" />
          <stop offset="38%" stop-color="rgb(255, 92, 74)" stop-opacity="0.24" />
          <stop offset="100%" stop-color="rgb(255, 92, 74)" stop-opacity="0" />
        </radialGradient>
      </defs>
      <g filter="url(#runtime-wispy)" fill="url(#runtime-blob)">
        <ellipse cx="70" cy="50" rx="55" ry="42" />
        <ellipse cx="90" cy="15" rx="32" ry="24" />
        <ellipse cx="20" cy="20" rx="34" ry="22" />
        <ellipse cx="85" cy="85" rx="32" ry="22" />
        <ellipse cx="15" cy="80" rx="34" ry="24" />
        <ellipse cx="5" cy="50" rx="28" ry="34" />
        <ellipse cx="45" cy="35" rx="22" ry="16" />
      </g>
    </svg>

    <main class="splash">
      <header class="splash-header">
        <h1>Para</h1>
      </header>

      <!-- Three-body simulation — Chenciner-Montgomery figure-8 orbit
           rendered to canvas via velocity Verlet integration. See
           /threebody.js for the integrator and initial conditions. -->
      <canvas class="three-body" aria-hidden="true"></canvas>

      <div class="brands">
        <a href="/libs/" class="brand-card lib">
          <span class="brand-dot" data-star="lib"></span>
          <span class="brand-name">Libraries</span>
          <span class="brand-role">the libraries</span>
          <span class="brand-meta">signals · parallel · pipeline · arena · simd · csv · arrow · rtp · mcp</span>
          <span class="brand-url">/libs →</span>
        </a>
        <a href="/lang/" class="brand-card lang">
          <span class="brand-dot" data-star="lang"></span>
          <span class="brand-name">Language</span>
          <span class="brand-role">the syntax</span>
          <span class="brand-meta">optional <code>.pts</code> sugar that compiles to JS</span>
          <span class="brand-url">/lang →</span>
        </a>
        <a href="/runtime/" class="brand-card runtime">
          <span class="brand-dot" data-star="runtime"></span>
          <span class="brand-name">Runtime</span>
          <span class="brand-role">ParaBun</span>
          <span class="brand-meta">Bun fork with GPU, hardware capture, on-device LLM</span>
          <span class="brand-url">/runtime →</span>
        </a>
      </div>

      <footer class="splash-footer">
        <a href="/docs/">docs</a> ·
        <a href="https://github.com/airgap/parabun" target="_blank" rel="noopener">github</a>
      </footer>
    </main>

    <script src="/space.js" defer></script>
    <script src="/threebody.js" defer></script>
    <script>
      // Pin each nebula's transform-origin to its card's actual screen
      // position, computed at hover time. Same pattern as script.dev's
      // splash; preserves the SVG attributes (viewBox / preserveAspectRatio
      // / ellipse cx/cy/rx/ry) so the geometry is purely declarative.
      (() => {
        function updateAspect() {
          const ratio = Math.min(1, window.innerWidth / window.innerHeight);
          document.documentElement.style.setProperty("--nebula-y-scale", ratio);
        }
        addEventListener("resize", updateAspect);
        addEventListener("load", updateAspect);
        updateAspect();

        function layoutOrigin(which) {
          const card = document.querySelector(`.brand-card.${which}`);
          const nebula = document.querySelector(`.nebula-${which}`);
          if (!card || !nebula) return;
          const r = card.getBoundingClientRect();
          const cx = ((r.left + r.right) / 2 / window.innerWidth) * 100;
          const cy = ((r.top + r.bottom) / 2 / window.innerHeight) * 100;
          const origin = `${cx}% ${cy}%`;
          for (const ell of nebula.querySelectorAll("ellipse")) {
            ell.style.transformOrigin = origin;
          }
        }
        for (const card of document.querySelectorAll(".brand-card")) {
          const which = card.classList.contains("lib") ? "lib" : card.classList.contains("lang") ? "lang" : "runtime";
          card.addEventListener("pointerenter", () => layoutOrigin(which));
          card.addEventListener("focusin", () => layoutOrigin(which));
        }
      })();
    </script>
  </body>
</html>
